<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#e989a5"><title>さきうさ 毎週テスト</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="styles.css"></head><body>
<header><div><small>毎週のミニテスト</small><h1>さきうさ テスト案内所</h1><p>予定・範囲・理解度を、ひとつにつなぐでおじゃ。</p></div><img id="mascot" src="assets/sakiusa-idle.gif" alt="さきうさ"></header>
<nav><span id="childNav"><button class="tab active" data-view="home">おうち</button><button class="tab" data-view="quiz">テストする</button></span><span id="parentNav"><button class="tab" data-view="manage">問題・予定管理</button><button class="tab" data-view="home">登録済みテスト</button><button class="tab" data-view="history">学習結果</button></span><a id="roleLink" class="role-link" href="parent.html">保護者用サイトへ</a></nav><main>
<section id="home" class="view active"><div id="nextCards" class="next-grid"></div><div class="card"><h2>登録済みテスト</h2><div id="testCards" class="test-cards"></div></div></section>
<section id="quiz" class="view"><div id="setup" class="card"><h2>テストの設定</h2><label>科目<select id="subject"><option value="英単語">英単語</option><option value="漢字">漢字</option></select></label><fieldset><legend>テスト予定日（複数選択可）</legend><div id="testChecks" class="checks"></div></fieldset><label>やり方<select id="mode"><option value="understanding">理解度テスト</option><option value="latestWrong">最後に間違えた問題</option><option value="everWrong">一度でも間違えた問題</option></select></label><label>問題数<select id="limit"><option value="10">10問</option><option value="20">20問</option><option value="all">すべて</option></select></label><button id="start" class="primary">テスト開始</button></div><div id="question" class="card center" hidden></div><div id="finish" class="card" hidden></div></section>
<section id="manage" class="view"><div class="grid"><div class="card"><h2>問題を取り込む</h2><p>専用ExcelまたはCSVを選ぶと、重複を除いて追加します。</p><label class="primary">Excel／CSVを選ぶ<input id="importFile" type="file" accept=".xlsx,.xls,.csv" hidden></label><p><a href="input-template.xlsx" download>入力テンプレートをダウンロード</a></p><p id="importMessage"></p></div><div class="card"><h2>予定を忘れない</h2><p>直近の英語・漢字テストをiPhoneのカレンダーへ登録できます。</p><button id="calendar" class="secondary">予定ファイルを作る</button></div></div><div class="card"><div class="head"><div><h2>問題を追加・編集</h2><p>入力内容と学習結果は、この端末内に保存されます。</p></div><div><button id="backup" class="secondary">バックアップ</button><label class="secondary">復元<input id="restore" type="file" accept=".json" hidden></label></div></div><form id="editor" class="editor"><input id="editId" type="hidden"><label>テスト日<input id="editDate" type="date" required></label><label>科目<select id="editSubject"><option>英単語</option><option>漢字</option></select></label><label>No.<input id="editNo" placeholder="201"></label><label>テスト名<input id="editTitle" placeholder="英単語ミニテスト"></label><label>範囲<input id="editRange" placeholder="No.201〜220"></label><label>問題<input id="editPrompt" required></label><label>解答<input id="editAnswer" required></label><label class="wide">解説・使用例<textarea id="editExplanation"></textarea></label><label class="wide">英語の誤答候補（カンマ区切り）<input id="editWrong"></label><label class="wide">管理用備考<input id="editNote"></label><div class="wide"><button class="primary" type="submit">保存</button> <button class="secondary" id="clearEditor" type="button">入力をクリア</button></div></form></div><div class="card"><h2>登録済みテスト</h2><div id="parentTestCards" class="test-cards"></div></div><div class="card"><h2>問題一覧</h2><div class="table"><table><thead><tr><th>日付</th><th>科目</th><th>No.</th><th>範囲</th><th>問題</th><th>解答</th><th>成績</th><th></th></tr></thead><tbody id="questions"></tbody></table></div></div></section>
<section id="history" class="view"><div class="card"><div class="head"><h2>学習結果</h2><div><select id="shareSubject"><option value="英単語">英単語</option><option value="漢字">漢字</option></select><button id="share" class="primary">LINE等で送る</button></div></div><div id="summary"></div><div class="table"><table><thead><tr><th>日時</th><th>科目</th><th>問題</th><th>回答</th><th>結果</th><th>時間</th></tr></thead><tbody id="results"></tbody></table></div></div></section>
</main><script src="assets/xlsx.full.min.js"></script><script src="app.js"></script><script src="achievements.js"></script><script src="child-dashboard.js"></script><script src="admin-tools.js"></script><script src="parent-dashboard.js"></script><script src="final-tweaks.js"></script></body></html>
